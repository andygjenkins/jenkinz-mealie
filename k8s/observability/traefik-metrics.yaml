# Enable Prometheus metrics on K3s's bundled Traefik, on an internal-only
# `metrics` entryPoint (:9101). K3s picks up this HelmChartConfig and
# re-renders the Traefik HelmChart manifest on the next reconcile.
#
# Apply once: kubectl apply -f k8s/observability/traefik-metrics.yaml
# Watch rollout: kubectl -n kube-system rollout status deployment/traefik
#
# Survives K3s upgrades — HelmChartConfig is the supported override mechanism.
apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: traefik
  namespace: kube-system
spec:
  valuesContent: |-
    # Enable Prometheus metrics on the built-in `metrics` entryPoint (port 9101).
    # The Traefik chart ships a `metrics` port in its defaults; we only need to
    # make sure it lands on the Service so ServiceMonitor can scrape it.
    metrics:
      prometheus:
        enabled: true
        entryPoint: metrics
        addEntryPointsLabels: true
        addRoutersLabels: true
        addServicesLabels: true
    ports:
      metrics:
        port: 9101
        exposedPort: 9101
        protocol: TCP
        expose:
          default: true       # exposes on ClusterIP; Hetzner firewall blocks 9101 externally
    podAnnotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "9101"
      prometheus.io/path: "/metrics"
