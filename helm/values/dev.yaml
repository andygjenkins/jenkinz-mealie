# Development environment values

# Disable persistence for local dev (faster restarts, no stale PVC issues)
persistence:
  enabled: false

# Disable ingress for local dev — Tilt port-forwards Mealie to localhost:9000 directly.
# Prod uses Traefik (K3s built-in) + cert-manager; that's wired in prod.yaml.
ingress:
  enabled: false

# Seed disabled - Tilt's local_resource runs scripts/seed.sh instead
# This avoids Helm hook issues with tilt's helm template approach
seed:
  enabled: false

resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

mealie:
  baseUrl: "http://mealie.local"
  allowSignup: true
  defaultGroup: "Jenkinz"
  # Admin lands in JenkinsJnrs; the other four (JenkinsSnrs, Munchkins, Frenkins,
  # Hongkins) are created by scripts/seed.sh via the admin API.
  defaultHousehold: "JenkinsJnrs"

# Use built-in PostgreSQL with official image
postgresql:
  enabled: false

externalDatabase:
  user: mealie
  password: mealie-dev-password
  database: mealie
  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "250m"
