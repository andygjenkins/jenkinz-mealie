# Development environment values

# Disable persistence for local dev (faster restarts, no stale PVC issues)
persistence:
  enabled: false

resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

mealie:
  baseUrl: "http://mealie.local"
  allowSignup: true

# Use built-in PostgreSQL with official image
postgresql:
  enabled: false

externalDatabase:
  user: mealie
  password: mealie-dev-password
  database: mealie
  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "250m"
